version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: easy-offers-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: easy_offers_db
      POSTGRES_USER: easy_user
      POSTGRES_PASSWORD: easy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easy_user -d easy_offers_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local